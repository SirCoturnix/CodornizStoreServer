<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Store</title>

    <link href="//Microsoft.WinJS.2.0/css/ui-light.css" rel="stylesheet" />
    <script src="//Microsoft.WinJS.2.0/js/base.js"></script>
    <script src="//Microsoft.WinJS.2.0/js/ui.js"></script>

    <link href="/css/default.css" rel="stylesheet" />
    <script src="/js/default.js"></script>

    <style id="dynamic-theme-css"></style>

    <style>
        body {
            overflow-x: hidden;
            overflow-y: auto;
            background-color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            transition: background 0.3s ease;
        }

        @keyframes win8Entrance {
            0% {
                opacity: 0;
                transform: translateX(100px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .win8-anim {
            opacity: 0;
            animation-name: win8Entrance;
            animation-duration: 0.6s;
            animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1);
            animation-fill-mode: forwards;
        }

        .page-container {
            padding: 100px 50px 50px 50px;
            box-sizing: border-box;
        }

        .header-section {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
        }

        #appTitle {
            margin-left: 15px;
            font-weight: lighter;
            font-size: 38px;
            color: inherit;
        }

        .review-count-header {
            font-size: 18px;
            opacity: 0.5;
            margin-left: 15px;
            font-weight: lighter;
            padding-top: 15px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
        }

        .left-stats {
            width: 300px;
            flex-shrink: 0;
        }

        .right-content {
            flex-grow: 1;
            max-width: 800px;
            margin-left: 100px;
        }

        .big-rating {
            font-size: 85px;
            font-weight: lighter;
            line-height: 1;
            margin-bottom: 10px;
        }

        .stars-large {
            color: #008a00;
            font-size: 32px;
            margin-bottom: 10px;
        }


        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 7px;
            font-size: 13px;
        }

        .bar-label {
            width: 50px;
            flex-shrink: 0;
        }

        .bar-bg {
            background: rgba(128,128,128,0.2);
            height: 14px;
            flex-grow: 1;
            margin: 0 12px;
        }

        .bar-fill {
            background: #008a00;
            height: 100%;
        }

        .bar-count {
            width: 30px;
            text-align: right;
            flex-shrink: 0;
        }

        .reviews-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .review-card {
            position: relative;
            padding: 20px 0;
            border-bottom: 1px solid rgba(128,128,128,0.2);
        }

        .user-icon {
            width: 45px;
            height: 45px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            float: left;
            margin-right: 15px;
        }

            .user-icon svg {
                fill: white;
                width: 25px;
            }

        .stars-small {
            font-size: 18px;
        }

        .btn-delete {
            position: absolute;
            top: 20px;
            right: 0;
            background: transparent;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
        }

        .write-section {
            margin-top: 60px;
            padding: 30px;
            background: rgba(128,128,128,0.05);
        }

        .star-input {
            font-size: 32px;
            color: #ccc;
            cursor: pointer;
            margin-bottom: 15px;
        }

            .star-input span.active {
                color: #008a00;
            }

        .write-section input, .write-section textarea {
            width: 100%;
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            background: white;
            font-family: 'Segoe UI';
            box-sizing: border-box;
        }

        .write-section button {
            display: block;
            background: #008a00;
            color: white;
            border: none;
            padding: 10px 45px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-radius: 4px;
        }

            .write-section button:disabled {
                background: #808080 !important;
                opacity: 0.6;
            }

        h2 {
            font-weight: lighter;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <script type="text/javascript">if (typeof window.MSApp === "undefined") { document.write('<style>html,body,body *{visibility:hidden!important;}html,body{background:white!important;}</style>'); }</script>
    <div id="topBarContainer"></div>
    <div class="page-container win8-anim">
        <div class="header-section">
            <button id="btnBack"<button class="win-backbutton" aria-label="Back"></button></a>
            <h1 id="appTitle">Ratings and reviews</h1>
            <span id="reviewCountHeader" class="review-count-header">0 reviews</span>
        </div>
        <div class="main-layout">

            <div class="left-stats">
                <div id="appNameSub" style="font-weight: bold; font-size: 18px; margin-bottom: 25px;"></div>

                <div id="ratingNumberBig" class="big-rating">4.3</div>
                <div id="mainStars" class="stars-large">★★★★★</div>

                <div id="avgRatingText" style="color: black; margin-bottom: 30px;">average rating</div>

                <div class="rating-bar-table">
                </div>
            </div>

            <div class="right-content">
                <div id="reviewsList" class="reviews-container"></div>
                <div class="write-section">
                    <h2 id="rateAppTitle">Rate this app</h2>
                    <div class="star-input" id="starRating">
                        <span id="s1">★</span><span id="s2">★</span><span id="s3">★</span><span id="s4">★</span><span id="s5">★</span>
                    </div>
                    <input type="text" id="newTitle" placeholder="Title of your review">
                    <textarea id="newBody" rows="4" placeholder=" What did you think of this app?"></textarea>
                    <button id="submitReview">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            "use strict";


            if (!Array.prototype.findIndex) {
              Array.prototype.findIndex = function(predicate) {
                if (this == null) { throw new TypeError('findIndex called on null or undefined'); }
                if (typeof predicate !== 'function') { throw new TypeError('predicate must be a function'); }
                var list = Object(this);
                var length = list.length >>> 0;
                var thisArg = arguments[1];
                for (var i = 0; i < length; i++) {
                  if (predicate.call(thisArg, list[i], i, list)) { return i; }
                }
                return -1;
              };
            }

            var pageTranslations = {
                "en": {
                    pageTitle: "Ratings and reviews", avgRating: "average rating",
                    stars: " stars", star: " star", reviews: " reviews", review: " review",
                    rateTitle: "Rate this app", placeholderTitle: "Title of your review",
                    placeholderBody: "  What did you think of this app?", submit: "Submit", delete: "Delete"
                },
                "de": {
                    pageTitle: "Bewertungen und Rezensionen", avgRating: "Durchschnittliche Bewertung",
                    stars: " Sterne", star: " Stern", reviews: " Bewertungen", review: " Bewertung",
                    rateTitle: "App bewerten", placeholderTitle: "Titel deiner Rezension",
                    placeholderBody: "  Was hältst du von dieser App?", submit: "Absenden", delete: "Löschen"
                },
                "fr": {
                    pageTitle: "Notes et avis", avgRating: "note moyenne",
                    stars: " étoiles", star: " étoile", reviews: " avis", review: " avis",
                    rateTitle: "Évaluer cette application", placeholderTitle: "Titel de votre avis",
                    placeholderBody: "  Qu'avez-vous pensé de cette application ?", submit: "Envoyer", delete: "Supprimer"
                },
                "es": {
                    pageTitle: "Notas y opiniones", avgRating: "calificación promedio",
                    stars: " estrellas", star: " estrella", reviews: " opiniones", review: " opinión",
                    rateTitle: "Calificar esta aplicación", placeholderTitle: "Título de tu opinión",
                    placeholderBody: "  ¿Qué te ha parecido esta aplicación?", submit: "Enviar", delete: "Eliminar"
                },
                "tr": {
                    pageTitle: "Derecelendirmeler ve incelemeler", avgRating: "ortalama puan",
                    stars: " yıldız", star: " yıldız", reviews: " inceleme", review: " inceleme",
                    rateTitle: "Uygulamayı derecelendirin", placeholderTitle: "İnceleme başlığı",
                    placeholderBody: "  Bu uygulama hakkında ne düşündünüz?", submit: "Gönder", delete: "Sil"
                },
                "ru": {
                    pageTitle: "Рейтинги и отзывы", avgRating: "средняя оценка",
                    stars: " звезд", star: " звезда", reviews: " отзывов", review: " отзыв",
                    rateTitle: "Оценить это приложение", placeholderTitle: "Заголовок вашего отзыва",
                    placeholderBody: "  Что вы думаете об этом приложении?", submit: "Отправить", delete: "Удалить"
                },
                "pl": {
                    pageTitle: "Oceny i recenzje", avgRating: "średnia ocena",
                    stars: " gwiazdek", star: " gwiazdka", reviews: " recenzji", review: " recenzja",
                    rateTitle: "Oceń tę aplikację", placeholderTitle: "Tytuł Twojej recenzji",
                    placeholderBody: "  Co sądzisz o tej aplikacji?", submit: "Wyślij", delete: "Usuń"
                },
                "ro": {
                    pageTitle: "Evaluări și recenzii", avgRating: "evaluare medie",
                    stars: " stele", star: " stea", reviews: " recenzii", review: " recenzie",
                    rateTitle: "Evaluează această aplicație", placeholderTitle: "Titlul recenziei tale",
                    placeholderBody: "  Ce părere ai despre această aplicație?", submit: "Trimite", delete: "Șterge"
                }

            };

            var lang = localStorage.getItem("ws_language") || "en";
            var t = pageTranslations[lang] || pageTranslations["en"];

            function applyPageTranslations() {
                document.getElementById("appTitle").innerText = t.pageTitle;
                document.getElementById("avgRatingText").innerText = t.avgRating;
                document.getElementById("rateAppTitle").innerText = t.rateTitle;
                document.getElementById("newTitle").placeholder = t.placeholderTitle;
                document.getElementById("newBody").placeholder = t.placeholderBody;
                document.getElementById("submitReview").innerText = t.submit;
            }
            applyPageTranslations();

            function applyTheme(th) {
                var styleTag = document.getElementById("dynamic-theme-css");
                if (th === 'default') {
                    styleTag.innerHTML = "";
                } else {
                    var bgImg = th.img ? "background-image: url('" + th.img + "') !important;" : "background-image: none !important;";
                    styleTag.innerHTML = "body { " +
                        "background-color: " + th.bg + " !important; " +
                        bgImg +
                        "color: " + th.text + " !important; " +
                        "font-family: " + th.font + " !important; " +
                        "} " +
                        "#appTitle, h2, .big-rating, .review-count-header { color: " + th.text + " !important; }";
                }
            }
            var savedTheme = localStorage.getItem("ws_active_theme");
            if (savedTheme) applyTheme(JSON.parse(savedTheme));


            var MASTER_SERVER_URL_APPS = 'https://reworkw8.github.io/RwStoreMasterServer/data/AllApps.json';
            var APPS_ENDPOINT = 'https://reworkw8.github.io/RwStoreMasterServer/data/apps/';
            var REVIEWS_ENDPOINT = "https://reworkw8.github.io/RwStoreMasterServer/data/apps/";

            var selectedStars = 5;
            var appTitle = "App";

            var query = window.location.search.substring(1).split("&");
            for (var i = 0; i < query.length; i++) {
                var pair = query[i].split("=");
                if (pair[0] == "title") {
                    appTitle = decodeURIComponent(pair[1].replace(/\+/g, " "));
                }
            }
            document.getElementById('appNameSub').innerText = appTitle;
            var storageKey = "user_reviews_" + appTitle.replace(/\s/g, '');


            function get(url, successCallback) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        if (successCallback) successCallback(xhr.responseText);
                    }
                };
                xhr.send();
            }


            function loadAppData() {
                if (!appTitle) return;

                get(MASTER_SERVER_URL_APPS, function (response) {
                    var data;
                    try {
                        data = JSON.parse(response);
                    } catch (e) { return; }

                    var AllAppsIds = [];
                    if (data.rework_core_system && data.rework_core_system.content_registry) {
                        var groups = data.rework_core_system.content_registry.deployment_groups;
                        var seen = {};
                        for (var key in groups) {
                            var payload = groups[key].payload;
                            if(payload && Array.isArray(payload)) {
                                for (var j = 0; j < payload.length; j++) {
                                    var lbl = payload[j].label || payload[j];
                                    if (!seen[lbl]) { seen[lbl] = true; AllAppsIds.push(lbl); }
                                }
                            }
                        }
                    } else if (data.AllApps) {
                        AllAppsIds = data.AllApps;
                    }

                    var appFound = false;
                    AllAppsIds.forEach(function (id) {
                        if (appFound) return;
                        var cleanId = id.replace(".json", "");

                        get(APPS_ENDPOINT + cleanId + '.json', function (res) {
                            try {
                                var appData = JSON.parse(res);
                                var name = appData.displayname || (appData.app_identity ? appData.app_identity.displayname : "Unknown");

                                if (name === appTitle) {
                                    appFound = true;
                                    renderAppStats(appData);
                                }
                            } catch (e) { }
                        });
                    });
                });
            }


            function renderAppStats(data) {
                var ratingVal = data.ratingNumber || "0.0";
                var starCount = parseInt(data.mainStars) || 0;
                var totalRatings = parseInt(data.ratingsCount) || 0;


                document.getElementById("ratingNumberBig").innerText = ratingVal;


                var starsHtml = "";
                for (var i = 0; i < 5; i++) {
                    if (i < starCount) {
                        starsHtml += "★";
                    } else {
                        starsHtml += "<span style='color: #d3d3d3; opacity: 1;'>★</span>";
                    }
                }
                document.getElementById("mainStars").innerHTML = starsHtml;


                var distribution = data.ratingDistribution || {
                    "5": Math.round(totalRatings * 0.7),
                    "4": Math.round(totalRatings * 0.15),
                    "3": Math.round(totalRatings * 0.08),
                    "2": Math.round(totalRatings * 0.04),
                    "1": Math.round(totalRatings * 0.03)
                };
                updateRatingBars(distribution, totalRatings);
            }


            function updateRatingBars(dist, total) {
                var container = document.querySelector(".rating-bar-table");
                var html = "";
                for (var i = 5; i >= 1; i--) {
                    var count = dist[i.toString()] || 0;
                    var percentage = total > 0 ? (count / total * 100) : 0;
                    var label = i + (i === 1 ? t.star : t.stars);

                    html += '<div class="bar-row">' +
                                '<span class="bar-label">' + label + '</span>' +
                                '<div class="bar-bg"><div class="bar-fill" style="width: ' + percentage + '%;"></div></div>' +
                                '<span class="bar-count">' + count + '</span>' +
                            '</div>';
                }
                container.innerHTML = html;
            }




            var starsInput = [
                document.getElementById('s1'), document.getElementById('s2'),
                document.getElementById('s3'), document.getElementById('s4'),
                document.getElementById('s5')
            ];

            function updateStarUI() {
                for (var k = 0; k < 5; k++) {
                    starsInput[k].className = (k < selectedStars) ? "active" : "";
                }
            }

            for (var m = 0; m < 5; m++) {
                (function(index) {
                    starsInput[index].onclick = function() {
                        selectedStars = index + 1;
                        updateStarUI();
                    };
                })(m);
            }
            updateStarUI();

            function renderReviews() {
                var list = document.getElementById('reviewsList');
                var countHeader = document.getElementById('reviewCountHeader');
                var submitBtn = document.getElementById('submitReview');
                var localReviews = JSON.parse(localStorage.getItem(storageKey) || "[]");

                var xhr = new XMLHttpRequest();
                xhr.open("GET", REVIEWS_ENDPOINT + "?app=" + encodeURIComponent(appTitle), true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        var serverReviews = [];
                        if (xhr.status === 200) {
                            try { serverReviews = JSON.parse(xhr.responseText); } catch (e) { serverReviews = []; }
                        }
                        localReviews.forEach(function (r) { r.isLocal = true; });
                        serverReviews.forEach(function (r) { r.isLocal = false; });

                        var allReviews = localReviews.concat(serverReviews);
                        submitBtn.disabled = (localReviews.length >= 3);
                        while (list.firstChild) { list.removeChild(list.firstChild); }

                        var countText = allReviews.length === 1 ? "1" + t.review : allReviews.length + t.reviews;
                        countHeader.innerText = countText;


                        allReviews.forEach(function (rev) {
                            var card = document.createElement('div');
                            card.className = "review-card";


                            var starsHtml = "";
                            for (var s = 0; s < 5; s++) {
                                if (s < rev.rating) {
                                    starsHtml += "<span style='color: #008a00;'>★</span>";
                                } else {
                                    starsHtml += "<span style='color: #d3d3d3;'>★</span>";
                                }
                            }

                            var deleteBtnHtml = rev.isLocal ? '<button class="btn-delete">' + t.delete + '</button>' : '';
                            card.innerHTML = deleteBtnHtml +
                                '<div class="user-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>' +
                                '<div><div class="date-text" style="font-size:12px; opacity:0.6;">' + (rev.date || "") + '</div>' +
                                '<div class="stars-small">' + starsHtml + '</div></div>' +
                                '<div class="review-title" style="font-weight:bold; margin-top:5px; font-size:16px;">' + rev.title + '</div>' +
                                '<div class="review-body" style="margin-top:5px; line-height:1.4;">' + rev.body + '</div>';
                            list.appendChild(card);

                            if (rev.isLocal) {
                                card.querySelector('.btn-delete').onclick = function () {
                                    var currentLocals = JSON.parse(localStorage.getItem(storageKey) || "[]");
                                    var idx = currentLocals.findIndex(function (x) { return x.title === rev.title && x.body === rev.body; });
                                    if (idx > -1) {
                                        currentLocals.splice(idx, 1);
                                        localStorage.setItem(storageKey, JSON.stringify(currentLocals));
                                        renderReviews();
                                    }
                                };
                            }
                        });
                    }
                };
                xhr.send();
            }

            document.getElementById('submitReview').onclick = function() {
                var localReviews = JSON.parse(localStorage.getItem(storageKey) || "[]");
                if (localReviews.length >= 3) return;
                var titleVal = document.getElementById('newTitle').value;
                var bodyVal = document.getElementById('newBody').value;
                if(!titleVal || !bodyVal) return;

                var newEntry = {
                    title: titleVal, body: bodyVal, rating: selectedStars,
                    date: new Date().toLocaleDateString(), app: appTitle
                };
                localReviews.unshift(newEntry);
                localStorage.setItem(storageKey, JSON.stringify(localReviews));


                var xhrPost = new XMLHttpRequest();
                xhrPost.open("POST", REVIEWS_ENDPOINT, true);
                xhrPost.setRequestHeader("Content-Type", "application/json");
                xhrPost.send(JSON.stringify(newEntry));

                document.getElementById('newTitle').value = "";
                document.getElementById('newBody').value = "";
                selectedStars = 5;
                updateStarUI();
                renderReviews();
            };

            document.getElementById('btnBack').onclick = function() {
                if(window.history.length > 1) { window.history.back(); }
                else { window.location.href = "default.html"; }
            };


            loadAppData();
            renderReviews();
        })();
    </script>
    <script type="text/javascript">
        (function() {
            function pingServer() {
                var xhr = new XMLHttpRequest();
                xhr.open("GET", "https://reworkw8.wixsite.com/rework", true);
                xhr.onreadystatechange = function() {};
                xhr.send();
            }
            pingServer();
            setInterval(pingServer, 1000);
        })();
    </script>
</body>
</html>
